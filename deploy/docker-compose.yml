services:
  freellmapi:
    image: ghcr.io/tashfeenahmed/freellmapi:v0.4.1
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    # Internal-only: bound to loopback. FreeLLMAPI is single-user and must
    # NOT be exposed to the internet. Do not change 127.0.0.1 to 0.0.0.0.
    expose:
      - "3001"
    volumes:
      - freellmapi-data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/ping').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  freellmapi-data:
